<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AI Text Summarizer</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 15px;
            width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            animation: fadeIn 0.8s ease-in-out;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        textarea {
            width: 100%;
            height: 150px;
            border-radius: 10px;
            border: 1px solid #ccc;
            padding: 10px;
            resize: none;
            outline: none;
            font-size: 14px;
        }

        textarea:focus {
            border-color: #667eea;
        }

        .options {
            margin: 15px 0;
            display: flex;
            justify-content: space-between;
        }

        select {
            padding: 8px;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .output {
            margin-top: 20px;
            padding: 15px;
            background: #f7f7f7;
            border-radius: 10px;
            min-height: 60px;
        }

        @keyframes fadeIn {
            from {opacity: 0; transform: translateY(20px);}
            to {opacity: 1; transform: translateY(0);}
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🧠 AI Text Summarizer</h1>

    <form method="POST">
        <textarea name="text" placeholder="Paste your text here..."></textarea>
        
        <br><br>
    
        <input type="file" name="file" accept=".pdf,.docx">

        <div class="options">
            <select name="method">
                <option value="extractive">Extractive</option>
                <option value="abstractive">Abstractive</option>
                <option value="multi">Multilingual (Hindi + Others)</option>
            </select>
        </div>

        <button type="submit">Summarize</button>
    </form>

    <div class="output">
        <strong>Summary:</strong>
        <p>{{ summary }}</p>
    </div>
</div>

</body>
</html>
